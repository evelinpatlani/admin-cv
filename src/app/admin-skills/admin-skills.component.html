<div class="wf-wrap">
  <div class="wf-card">
    <div class="wf-header">
      <div class="wf-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2l1.5 3 3.5.5-2.5 2.5.6 3.5L8 9.8l-3.1 1.7.6-3.5L3 5.5 6.5 5z" stroke="#185FA5" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="wf-title">Habilidades</div>
        <div class="wf-sub">Agrega tus competencias técnicas o blandas</div>
      </div>
    </div>
    <div class="wf-body">
      <div class="wf-row">
        <div class="wf-field">
          <label class="wf-label">Habilidad</label>
          <input class="wf-input" type="text" placeholder="ej. Angular, SQL, Liderazgo..."
            [(ngModel)]="newSkillName" (keyup.enter)="agregarSkill()">
        </div>
        <div class="wf-field">
          <label class="wf-label">Nivel (0–100): {{ newSkillLevel }}%</label>
          <input class="wf-input" type="range" min="0" max="100"
            [(ngModel)]="newSkillLevel">
        </div>
      </div>
      <button class="wf-add-btn" (click)="agregarSkill()">+ Agregar</button>

      <div class="wf-list" *ngIf="skillsList.length > 0">
        <div class="wf-item" *ngFor="let s of skillsList; let i = index">
          <span class="wf-item-main">{{ s.name }} — {{ s.level }}%</span>
          <button class="wf-del" (click)="eliminarSkill(i)">Eliminar</button>
        </div>
      </div>
      <p class="wf-empty" *ngIf="skillsList.length === 0">Aún no hay habilidades agregadas.</p>
    </div>
    <div class="wf-footer">
      <button class="wf-btn" (click)="guardarSkills()">{{ btntxt }}</button>
    </div>
  </div>
</div>
