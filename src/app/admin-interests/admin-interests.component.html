<div class="wf-wrap">
  <div class="wf-card">
    <div class="wf-header">
      <div class="wf-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13s-6-4-6-7.5A3.5 3.5 0 018 4.17 3.5 3.5 0 0114 5.5C14 9 8 13 8 13z" stroke="#185FA5" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="wf-title">Intereses</div>
        <div class="wf-sub">Agrega tus hobbies e intereses personales</div>
      </div>
    </div>
    <div class="wf-body">
      <div class="wf-field">
        <label class="wf-label">Nuevo interés</label>
        <div class="wf-add-row">
          <input class="wf-input" type="text" placeholder="ej. Fotografía, Senderismo..."
            [(ngModel)]="newInterest" (keyup.enter)="agregarInterest()">
          <button class="wf-add-btn" (click)="agregarInterest()">+ Agregar</button>
        </div>
      </div>
      <div class="wf-list" *ngIf="interestsList.length > 0">
        <div class="wf-item" *ngFor="let interest of interestsList; let i = index">
          <span class="wf-item-main">{{ interest }}</span>
          <button class="wf-del" (click)="eliminarInterest(i)">Eliminar</button>
        </div>
      </div>
      <p class="wf-empty" *ngIf="interestsList.length === 0">Aún no hay intereses agregados.</p>
    </div>
    <div class="wf-footer">
      <button class="wf-btn" (click)="guardarInterests()">{{ btntxt }}</button>
    </div>
  </div>
</div>
